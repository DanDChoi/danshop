spring:
  application:
    name: danshop
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database: postgresql
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
    username: danuser
    url: jdbc:postgresql://localhost:5432/danshop
    password: dan
jwt:
  secret: danshop-secret-key-must-be-at-least-32-characters
  expiration: 86400000


